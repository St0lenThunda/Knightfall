name: Knightfall CI

on:
  push:
    branches: [ main, duolingo ]
  pull_request:
    branches: [ main, duolingo ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run build -- --dry-run

    - name: Run Tests
      run: npm test -- --run
